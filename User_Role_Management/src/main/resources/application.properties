# --- Database Connection ---
# Fixed name 'testdb' so it doesn't change every restart
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- H2 Console (Database Browser) ---
# Access this at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Allows the console to work within the Spring Security frame
spring.headers.frame-options=sameorigin

# --- JPA / Hibernate Settings ---
# Automatically creates the tables based on your @Entity classes
spring.jpa.hibernate.ddl-auto=update
# Shows the SQL in your terminal so you can see the 'INSERT' happen
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
# --- Logging ---
# Useful to see why Security might be blocking you
logging.level.org.springframework.security=DEBUG

# --- JWT Configuration ---
application.security.jwt.secret-
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000
